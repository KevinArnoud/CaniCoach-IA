<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaniCoach IA - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #0056CC;
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f0f8ff;
            border-radius: 10px;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐕</div>
        <h1>CaniCoach IA</h1>
        <p>Application d'éducation canine éthique</p>
        <button onclick="testFunction()">Tester l'application</button>
        <div id="status" class="status" style="display: none;">
            ✅ L'application fonctionne parfaitement !
        </div>
    </div>

    <script>
        function testFunction() {
            document.getElementById('status').style.display = 'block';
            console.log('CaniCoach IA - Application testée avec succès !');
        }
        
        console.log('CaniCoach IA - Application chargée');
    </script>
</body>
</html>
